<body style="--primary: #d0404c;">
  <div class="flex justify-center items-center min-h-screen px-4 max-md:py-10">
    <div class="relative max-w-[482px] w-full overflow-hidden">
      <!-- pink background layer -->
      <div class="absolute -z-10 top-0 bottom-0 left-0 right-0 rounded-[24px] bg-primary opacity-20" style="background-color: #d0404c;"></div>
      
      <!-- main card -->
      <div class="rounded-2xl overflow-hidden">
        <div class="max-h-[calc(100vh-80px)] flex flex-col m-2 bg-[#fbfbfb] rounded-2xl p-6 relative">
          
          <!-- header with UPDATED LOGO (PureLife) -->
          <div class="py-4 text-center border-b border-b-[#979797]">
            <img src="https://www.purelifehealth.io/app-logo.png" class="max-h-[64px] max-w-[160px] object-contain mx-auto" width="160" height="45" alt="PureLife Health logo">
          </div>
          
          <!-- scrollable content -->
          <div class="overflow-y-auto no-scrollbar">
            <h1 class="text-center text-[#2c2c2c] text-2xl mt-4">Consult a Doctor</h1>
            <p class="text-[#666] text-xs text-center mt-4 leading-relaxed">Fill the form below and we'll connect you to a doctor</p>
            
            <!-- main form area (preserves HMO/Access ID block from UI) -->
            <div class="px-0.5 m-1">
              <form id="consultationForm" class="flex flex-col gap-4 mt-4">
                
                <!-- exact HMO/Access ID block from the UI -->
                <div>
                  <label class="text-sm leading-none" for="hmoId">HMO/Access ID<sup class="text-destructive text-sm font-medium ml-0.5">*</sup></label>
                  <p class="text-xs text-[#929292] mt-0">This is the HMO/Access ID given to you by your provider.</p>
                  <div class="flex gap-2 items-center">
                    <input class="flex h-12 w-full rounded-md border border-input bg-white px-3 py-1 text-base lg:text-xs text-muted-foreground shadow-sm transition-colors placeholder:text-muted-foreground placeholder:opacity-50 my-[2px]" 
                           id="hmoId" name="hmoId" placeholder="Enter your ID" value="HMO12345" style="outline-color: #d0404c;">
                  </div>
                  <p class="text-xs text-[#929292] mt-0">Can't remember your access id<span class="description-link"> click here</span></p>
                </div>

                <!-- Patient details (required by API) -->
                <div class="grid grid-cols-2 gap-3 mt-2">
                  <!-- first name -->
                  <div>
                    <label class="text-sm leading-none" for="firstName">First name <sup class="text-destructive">*</sup></label>
                    <input type="text" id="firstName" name="firstName" value="Victor" required
                           class="flex h-12 w-full rounded-md border border-input bg-white px-3 py-1 text-base lg:text-xs text-muted-foreground shadow-sm my-[2px]"
                           style="outline-color: #d0404c;">
                  </div>
                  <!-- last name -->
                  <div>
                    <label class="text-sm leading-none" for="lastName">Last name <sup class="text-destructive">*</sup></label>
                    <input type="text" id="lastName" name="lastName" value="Ebuka" required
                           class="flex h-12 w-full rounded-md border border-input bg-white px-3 py-1 text-base lg:text-xs text-muted-foreground shadow-sm my-[2px]"
                           style="outline-color: #d0404c;">
                  </div>
                  <!-- email (col-span-2) -->
                  <div class="col-span-2">
                    <label class="text-sm leading-none" for="email">Email <sup class="text-destructive">*</sup></label>
                    <input type="email" id="email" name="email" value="victorebukachukwujekwu@gmail.com" required
                           class="flex h-12 w-full rounded-md border border-input bg-white px-3 py-1 text-base lg:text-xs text-muted-foreground shadow-sm my-[2px]"
                           style="outline-color: #d0404c;">
                  </div>
                  <!-- phone -->
                  <div class="col-span-2">
                    <label class="text-sm leading-none" for="phoneNumber">Phone number <sup class="text-destructive">*</sup></label>
                    <input type="tel" id="phoneNumber" name="phoneNumber" value="08167945270" required
                           class="flex h-12 w-full rounded-md border border-input bg-white px-3 py-1 text-base lg:text-xs text-muted-foreground shadow-sm my-[2px]"
                           style="outline-color: #d0404c;">
                  </div>
                  <!-- gender & dob -->
                  <div>
                    <label class="text-sm leading-none" for="gender">Gender <sup class="text-destructive">*</sup></label>
                    <select id="gender" name="gender" required
                            class="flex h-12 w-full rounded-md border border-input bg-white px-3 py-1 text-base lg:text-xs text-muted-foreground shadow-sm my-[2px]"
                            style="outline-color: #d0404c;">
                      <option value="Male" selected>Male</option>
                      <option value="Female">Female</option>
                      <option value="Other">Other</option>
                    </select>
                  </div>
                  <div>
                    <label class="text-sm leading-none" for="dob">Date of birth <sup class="text-destructive">*</sup></label>
                    <input type="date" id="dob" name="dob" value="1972-11-29" required
                           class="flex h-12 w-full rounded-md border border-input bg-white px-3 py-1 text-base lg:text-xs text-muted-foreground shadow-sm my-[2px]"
                           style="outline-color: #d0404c;">
                  </div>
                </div>

                <!-- doctor id (hidden) - unchanged from default -->
                <input type="hidden" name="doctor" value="62fb71cc87b0180013f54f15">

                <!-- symptoms (simplified: one symptom name) -->
                <div>
                  <label class="text-sm leading-none" for="symptom">Symptom <sup class="text-destructive">*</sup></label>
                  <input type="text" id="symptom" name="symptom" value="Cough" required
                         class="flex h-12 w-full rounded-md border border-input bg-white px-3 py-1 text-base lg:text-xs text-muted-foreground shadow-sm my-[2px]"
                         style="outline-color: #d0404c;">
                </div>

                <!-- discomfort level (1-10) -->

                  <label class="text-sm leading-none" for="discomfortLevel">Discomfort level (1-10) <sup class="text-destructive">*</sup></label>
                  <input type="number" id="discomfortLevel" name="discomfortLevel" min="1" max="10" value="1" required
                         class="flex h-12 w-full rounded-md border border-input bg-white px-3 py-1 text-base lg:text-xs text-muted-foreground shadow-sm my-[2px]"
                         style="outline-color: #d0404c;">
                </div>

                <!-- description -->
                <div>
                  <label class="text-sm leading-none" for="description">Description <sup class="text-destructive">*</sup></label>
                  <textarea id="description" name="description" rows="2" required
                            class="flex w-full rounded-md border border-input bg-white px-3 py-2 text-base lg:text-xs text-muted-foreground shadow-sm my-[2px]"
                            style="outline-color: #d0404c;">This is a serious something - Dietetics</textarea>
                </div>

                <!-- first notice -->
                <div>
                  <label class="text-sm leading-none" for="firstNotice">First noticed <sup class="text-destructive">*</sup></label>
                  <input type="text" id="firstNotice" name="firstNotice" value="last week" required
                         class="flex h-12 w-full rounded-md border border-input bg-white px-3 py-1 text-base lg:text-xs text-muted-foreground shadow-sm my-[2px]"
                         style="outline-color: #d0404c;">
                </div>

                <!-- contact medium & type (scheduled) -->
                <div class="grid grid-cols-2 gap-3">
                  <div>
                    <label class="text-sm leading-none" for="contactMedium">Contact medium</label>
                    <select id="contactMedium" name="contactMedium"
                            class="flex h-12 w-full rounded-md border border-input bg-white px-3 py-1 text-base lg:text-xs text-muted-foreground shadow-sm my-[2px]"
                            style="outline-color: #d0404c;">
                      <option value="video" selected>Video</option>
                      <option value="audio">Audio</option>
                      <option value="chat">Chat</option>
                    </select>
                  </div>
                  <div>
                    <label class="text-sm leading-none" for="type">Type</label>
                    <select id="type" name="type"
                            class="flex h-12 w-full rounded-md border border-input bg-white px-3 py-1 text-base lg:text-xs text-muted-foreground shadow-sm my-[2px]"
                            style="outline-color: #d0404c;">
                      <option value="scheduled" selected>Scheduled</option>
                      <option value="urgent">Urgent</option>
                    </select>
                  </div>
                </div>

                <!-- scheduled time (datetime-local then convert to ISO) -->
                <div>
                  <label class="text-sm leading-none" for="appointmentTime">Appointment time <sup class="text-destructive">*</sup></label>
                  <input type="datetime-local" id="appointmentTime" name="appointmentTime" value="2025-01-28T12:00" required
                         class="flex h-12 w-full rounded-md border border-input bg-white px-3 py-1 text-base lg:text-xs text-muted-foreground shadow-sm my-[2px]"
                         style="outline-color: #d0404c;">
                </div>

                <!-- address -->
                <div>
                  <label class="text-sm leading-none" for="address">Address</label>
                  <input type="text" id="address" name="address" value="24 Dikko Road, Down South, Enugu, Nigeria"
                         class="flex h-12 w-full rounded-md border border-input bg-white px-3 py-1 text-base lg:text-xs text-muted-foreground shadow-sm my-[2px]"
                         style="outline-color: #d0404c;">
                </div>

                <!-- NEW providerId as requested, plus other hidden fields -->
                <input type="hidden" name="providerId" value="69b16fb5a4af2c7a8645968f">   <!-- UPDATED provider ID -->
                <input type="hidden" name="createdThrough" value="api">
                <input type="hidden" name="status" value="accepted">
                <input type="hidden" name="paid" value="true">

                <!-- Submit button (styled like primary) -->
                <button type="submit" id="submitBtn"
                        class="w-full py-3 px-6 bg-[#d0404c] text-white rounded-full font-semibold text-sm hover:bg-[#b83642] transition disabled:opacity-50 disabled:cursor-not-allowed mt-2">
                  Schedule consultation
                </button>

                <!-- tiny status message -->
                <div id="formStatus" class="text-xs text-center text-[#929292] mt-2"></div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const form = document.getElementById('consultationForm');
      const submitBtn = document.getElementById('submitBtn');
      const statusDiv = document.getElementById('formStatus');

      // Use staging endpoint (as per original) but with NEW API KEY
      const BASE_URL = 'https://staging-v2.heala.io';
      const API_KEY = '8DiI87i08kBC/vtA3~W';   // <-- UPDATED API KEY

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Disable button and show sending status
        submitBtn.disabled = true;
        submitBtn.textContent = 'Scheduling...';
        statusDiv.textContent = '';

        // Gather form values
        const firstName = document.getElementById('firstName').value;
        const lastName = document.getElementById('lastName').value;
        const email = document.getElementById('email').value;
        const phoneNumber = document.getElementById('phoneNumber').value;
        const gender = document.getElementById('gender').value;
        const dob = document.getElementById('dob').value; // yyyy-mm-dd
        const doctor = document.querySelector('input[name="doctor"]').value;
        const symptomName = document.getElementById('symptom').value;
        const discomfortLevel = document.getElementById('discomfortLevel').value;
        const description = document.getElementById('description').value;
        const firstNotice = document.getElementById('firstNotice').value;
        const contactMedium = document.getElementById('contactMedium').value;
        const type = document.getElementById('type').value;
        const appointmentTimeInput = document.getElementById('appointmentTime').value;
        const address = document.getElementById('address').value;
        // Use updated providerId from hidden input
        const providerId = document.querySelector('input[name="providerId"]').value; 
        const createdThrough = document.querySelector('input[name="createdThrough"]').value;
        const status = document.querySelector('input[name="status"]').value;
        const paid = document.querySelector('input[name="paid"]').value === 'true'; // boolean

        // Convert appointmentTime to ISO string with Z
        let isoTime = '';
        if (appointmentTimeInput) {
          const localDate = new Date(appointmentTimeInput);
          if (!isNaN(localDate.getTime())) {
            isoTime = localDate.toISOString(); 
          } else {
            isoTime = '2025-01-28T12:00:00.000Z';
          }
        } else {
          isoTime = '2025-01-28T12:00:00.000Z';
        }

        // Build the payload exactly matching the specification, with new providerId
        const payload = {
          patientData: {
            firstName,
            lastName,
            email,
            phoneNumber,
            gender,
            dob
          },
          doctor,
          symptoms: [
            { name: symptomName }
          ],
          discomfortLevel: discomfortLevel.toString(),
          description,
          firstNotice,
          contactMedium,
          type,
          time: isoTime,
          createdThrough,
          providerId,               // <-- now uses 69b16fb5a4af2c7a8645968f
          status,
          address,
          paid
        };

        try {
          const response = await fetch(`${BASE_URL}/rest/consultations/external/create`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Api-Key ${API_KEY}`   // new key in use
            },
            body: JSON.stringify(payload)
          });

          const data = await response.json();

          if (response.ok) {
            statusDiv.innerHTML = '<span style="color: #2e7d32;">✓ Consultation scheduled successfully!</span>';
            // Optional: reset to default demo values (keeping them for clarity)
          } else {
            console.error('API error', data);
            statusDiv.innerHTML = `<span style="color: #d0404c;">✗ Error: ${data.message || 'Check console'}</span>`;
          }
        } catch (error) {
          console.error('Network error', error);
          statusDiv.innerHTML = '<span style="color: #d0404c;">✗ Network error. Is CORS or endpoint reachable?</span>';
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Schedule consultation';
        }
      });

      // optional: style outline on focus matches primary
      const inputs = document.querySelectorAll('input, select, textarea');
      inputs.forEach(input => {
        input.addEventListener('focus', () => {
          input.style.outline = '2px solid #d0404c';
          input.style.outlineOffset = '0';
        });
        input.addEventListener('blur', () => {
          input.style.outline = '';
        });
      });

    })();
  </script>

  <!-- Notification region placeholder (from original) -->
  <div role="region" aria-label="Notifications" tabindex="-1" style="pointer-events: none;"><ol tabindex="-1" class="fixed top-0 z-[100] flex max-h-screen w-full flex-col-reverse p-4 sm:bottom-0 sm:right-0 sm:top-auto sm:flex-col md:max-w-[420px]"></ol></div>
