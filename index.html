<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <!-- KEY FIX: maximum-scale=1 prevents iOS Safari zoom on input focus -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <!-- favicon & logo -->
  <link rel="icon" href="https://www.purelifehealth.io/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.cdnfonts.com/css/euclid-circular-a?styles=100037,100036,100039,100031" rel="stylesheet">
  <style>
    /* reset & base – matching the given UI exactly */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Euclid Circular A', sans-serif;
      background: #f5f5f5;
      --primary: #d0404c;
    }

    /* layout utilities */
    .flex { display: flex; }
    .justify-center { justify-content: center; }
    .items-center { align-items: center; }
    .min-h-screen { min-height: 100vh; }
    .px-4 { padding-left: 1rem; padding-right: 1rem; }
    .max-md\:py-10 { padding-top: 2.5rem; padding-bottom: 2.5rem; }
    .relative { position: relative; }
    .max-w-\[482px\] { max-width: 482px; }
    .w-full { width: 100%; }
    .overflow-hidden { overflow: hidden; }
    .absolute { position: absolute; }
    .-z-10 { z-index: -10; }
    .top-0 { top: 0; }
    .bottom-0 { bottom: 0; }
    .left-0 { left: 0; }
    .right-0 { right: 0; }
    .rounded-\[24px\] { border-radius: 24px; }
    .bg-primary { background-color: var(--primary); }
    .opacity-20 { opacity: 0.2; }
    .rounded-2xl { border-radius: 1rem; }
    .overflow-y-auto { overflow-y: auto; }
    .flex-col { flex-direction: column; }
    .m-2 { margin: 0.5rem; }
    .bg-\[\#fbfbfb\] { background-color: #fbfbfb; }
    .p-6 { padding: 1.5rem; }
    .py-4 { padding-top: 1rem; padding-bottom: 1rem; }
    .text-center { text-align: center; }
    .border-b { border-bottom: 1px solid; }
    .border-b-\[\#979797\] { border-color: #979797; }
    .max-h-\[64px\] { max-height: 64px; }
    .max-w-\[160px\] { max-width: 160px; }
    .object-contain { object-fit: contain; }
    .mx-auto { margin-left: auto; margin-right: auto; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    .text-\[\#2c2c2c\] { color: #2c2c2c; }
    .text-2xl { font-size: 1.5rem; }
    .mt-4 { margin-top: 1rem; }
    .text-\[\#666\] { color: #666; }
    .text-xs { font-size: 0.75rem; }
    .leading-relaxed { line-height: 1.625; }
    .px-0\.5 { padding-left: 0.125rem; padding-right: 0.125rem; }
    .m-1 { margin: 0.25rem; }
    .gap-4 { gap: 1rem; }
    .mt-4 { margin-top: 1rem; }
    .text-sm { font-size: 0.875rem; }
    .leading-none { line-height: 1; }
    .text-destructive { color: #d0404c; }
    .font-medium { font-weight: 500; }
    .ml-0\.5 { margin-left: 0.125rem; }
    .text-\[\#929292\] { color: #929292; }
    .mt-0 { margin-top: 0; }
    .gap-2 { gap: 0.5rem; }
    .items-center { align-items: center; }
    .h-12 { height: 3rem; }
    .w-full { width: 100%; }
    .rounded-md { border-radius: 0.375rem; }
    .border { border: 1px solid #e2e8f0; }
    .border-input { border-color: #e2e8f0; }
    .bg-white { background-color: white; }
    .px-3 { padding-left: 0.75rem; padding-right: 0.75rem; }
    .py-1 { padding-top: 0.25rem; padding-bottom: 0.25rem; }
    .text-base { font-size: 1rem; }
    .lg\:text-xs { font-size: 0.75rem; }
    .text-muted-foreground { color: #6b7280; }
    .shadow-sm { box-shadow: 0 1px 2px 0 rgb(0 0 0 / 0.05); }
    .transition-colors { transition-property: color, background-color, border-color, text-decoration-color, fill, stroke; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 150ms; }
    .placeholder\:text-muted-foreground::placeholder { color: #9ca3af; }
    .placeholder\:opacity-50::placeholder { opacity: 0.5; }
    .my-\[2px\] { margin-top: 2px; margin-bottom: 2px; }
    .outline-none { outline: none; }
    .cursor-pointer { cursor: pointer; }
    .mt-6 { margin-top: 1.5rem; }
    .py-3 { padding-top: 0.75rem; padding-bottom: 0.75rem; }
    .px-6 { padding-left: 1.5rem; padding-right: 1.5rem; }
    .bg-\[\#d0404c\] { background-color: #d0404c; }
    .text-white { color: white; }
    .rounded-full { border-radius: 9999px; }
    .font-semibold { font-weight: 600; }
    .hover\:bg-\[\#b83642\]:hover { background-color: #b83642; }
    .transition { transition-property: color, background-color, border-color, text-decoration-color, fill, stroke, opacity, box-shadow, transform, filter, backdrop-filter; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 150ms; }
    .disabled\:opacity-50:disabled { opacity: 0.5; }
    .disabled\:cursor-not-allowed:disabled { cursor: not-allowed; }
    .grid { display: grid; }
    .grid-cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .col-span-2 { grid-column: span 2 / span 2; }
    .mb-2 { margin-bottom: 0.5rem; }
    .block { display: block; }
    .mt-1 { margin-top: 0.25rem; }
    .mt-2 { margin-top: 0.5rem; }
    .hidden { display: none; }
    .mb-4 { margin-bottom: 1rem; }

    /* hide spin for number input */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button {
      -webkit-appearance: none;
      margin: 0;
    }
    input[type=number] { -moz-appearance: textfield; }

    /* consistent spacing between form elements */
    .form-group {
      margin-bottom: 1.25rem;
    }

    /* symptom add button */
    .add-symptom-btn {
      background-color: #f0f0f0;
      border: 1px dashed #d0404c;
      color: #d0404c;
      border-radius: 9999px;
      padding: 0.5rem 1rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      width: fit-content;
      white-space: nowrap;
      /* Keep button text small without triggering zoom */
      font-size: 0.75rem;
    }
    .add-symptom-btn:hover {
      background-color: #ffe5e7;
    }
    .symptom-tag {
      display: inline-flex;
      align-items: center;
      background-color: #f0f0f0;
      border-radius: 9999px;
      padding: 0.25rem 0.75rem;
      margin-right: 0.5rem;
      margin-bottom: 0.5rem;
      font-size: 0.75rem;
    }
    .symptom-tag button {
      background: none;
      border: none;
      margin-left: 0.5rem;
      color: #666;
      font-weight: bold;
      cursor: pointer;
      font-size: 0.875rem;
    }
    .symptom-tag button:hover { color: #d0404c; }
    .symptom-input-wrapper {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin-top: 0.5rem;
    }
    .symptom-input-wrapper input {
      width: 70%;
    }
    
    /* big textarea */
    textarea#description {
      min-height: 120px;
      resize: vertical;
      padding-top: 0.75rem !important;
      padding-bottom: 0.75rem;
    }
    
    /* optional badge */
    .optional-badge {
      color: #929292;
      font-weight: normal;
      font-size: 0.7rem;
      margin-left: 0.25rem;
    }

    /* grid gap */
    .grid-cols-2 {
      gap: 1rem;
    }

    /* =====================================================
       iOS / MOBILE ZOOM FIX
       All inputs, selects, textareas MUST be 16px minimum
       to prevent iOS Safari from zooming on focus.
       We use font-size: 16px directly — no transforms.
       ===================================================== */
    input,
    select,
    textarea {
      font-size: 16px !important;
      -webkit-text-size-adjust: 100%;
    }

    input::placeholder,
    textarea::placeholder {
      font-size: 16px !important;
    }

    /* Labels and non-input UI text stay small */
    label,
    .text-xs,
    .text-sm,
    .step-label,
    .optional-badge,
    .tracking-label,
    .detail-label {
      font-size: 0.75rem !important;
    }

    .symptom-tag {
      font-size: 0.75rem !important;
    }

    .add-symptom-btn {
      font-size: 0.75rem !important;
    }

    /* =====================================================
       MOBILE LAYOUT — force 2-column grids to stay 2-col
       on small screens for: gender+dob, discomfort+firstNotice
       ===================================================== */
    @media (max-width: 480px) {
      /* Default: stack to 1 column */
      .grid-cols-2 {
        grid-template-columns: 1fr 1fr; /* keep 2 col by default on mobile */
        gap: 0.625rem;
      }

      /* Full-width overrides for items that SHOULD stack */
      .col-span-2 {
        grid-column: span 2 / span 2;
      }

      /* First/Last name row — keep as 2 cols (default above handles it) */

      /* Email, phone — already col-span-2, stays full width */

      /* Gender + DOB — stays 2 cols (default above) */

      /* Discomfort + First Notice — stays 2 cols (default above) */

      /* Contact medium — col-span-2, full width */

      /* Shrink label text slightly on very small screens */
      label, .text-sm {
        font-size: 0.7rem !important;
      }

      /* Ensure select/input height is comfortable on mobile */
      .h-12 {
        height: 2.75rem;
      }

      /* Symptom input wrapper adjustment */
      .symptom-input-wrapper {
        flex-wrap: wrap;
      }
      .symptom-input-wrapper input {
        width: 100%;
      }
      .add-symptom-btn {
        width: 100%;
        text-align: center;
      }
    }

    /* Step indicators */
    .step-indicator {
      display: flex;
      justify-content: space-between;
      margin-bottom: 2rem;
      position: relative;
    }
    .step-indicator::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 2px;
      background: #e0e0e0;
      transform: translateY(-50%);
      z-index: 1;
    }
    .step {
      position: relative;
      z-index: 2;
      background: #fbfbfb;
      padding: 0 0.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .step-number {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: #e0e0e0;
      color: #666;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      margin-bottom: 0.25rem;
    }
    .step.active .step-number {
      background: #d0404c;
      color: white;
    }
    .step.completed .step-number {
      background: #2e7d32;
      color: white;
    }
    .step-label {
      font-size: 0.75rem;
      color: #666;
    }
    .step.active .step-label {
      color: #d0404c;
      font-weight: 500;
    }

    /* Navigation buttons */
    .nav-buttons {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
    }
    .nav-btn {
      flex: 1;
      padding: 0.75rem;
      border-radius: 9999px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .nav-btn.prev {
      background: #f0f0f0;
      color: #666;
      border: 1px solid #ddd;
    }
    .nav-btn.prev:hover {
      background: #e5e5e5;
    }
    .nav-btn.next {
      background: #d0404c;
      color: white;
      border: none;
    }
    .nav-btn.next:hover {
      background: #b83642;
    }

    /* Success page styles */
    .success-page {
      text-align: center;
      padding: 1rem 0;
    }
    .success-icon {
      width: 80px;
      height: 80px;
      background: #2e7d32;
      color: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      margin: 0 auto 1.5rem;
    }
    .success-title {
      color: #2e7d32;
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .tracking-id {
      background: #f0f0f0;
      padding: 0.75rem;
      border-radius: 12px;
      margin: 1.5rem 0;
      border: 1px dashed #d0404c;
    }
    .tracking-label {
      font-size: 0.75rem;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .tracking-value {
      font-size: 2rem;
      font-weight: 700;
      color: #d0404c;
      margin-top: 0.25rem;
    }
    .consultation-details {
      background: #f9f9f9;
      border-radius: 16px;
      padding: 1.25rem;
      margin: 1.5rem 0;
      text-align: left;
    }
    .detail-row {
      display: flex;
      justify-content: space-between;
      padding: 0.75rem 0;
      border-bottom: 1px solid #e0e0e0;
    }
    .detail-row:last-child {
      border-bottom: none;
    }
    .detail-label {
      font-weight: 500;
      color: #666;
    }
    .detail-value {
      color: #2c2c2c;
      font-weight: 500;
    }
    .join-btn {
      display: inline-block;
      width: 100%;
      padding: 1rem;
      background: #d0404c;
      color: white;
      border-radius: 9999px;
      font-weight: 600;
      text-decoration: none;
      margin: 1rem 0;
      transition: background 0.2s;
    }
    .join-btn:hover {
      background: #b83642;
    }
    .new-consultation-btn {
      display: inline-block;
      width: 100%;
      padding: 1rem;
      background: #f0f0f0;
      color: #666;
      border-radius: 9999px;
      font-weight: 500;
      text-decoration: none;
      border: 1px solid #ddd;
      cursor: pointer;
      transition: all 0.2s;
    }
    .new-consultation-btn:hover {
      background: #e5e5e5;
    }
  </style>
  <title>Consult a Doctor · PureLife Health</title>
</head>
<body style="--primary: #d0404c;">
  <div class="flex justify-center items-center min-h-screen px-4 max-md:py-10">
    <div class="relative max-w-[482px] w-full overflow-hidden">
      <!-- pink background layer -->
      <div class="absolute -z-10 top-0 bottom-0 left-0 right-0 rounded-[24px] bg-primary opacity-20" style="background-color: #d0404c;"></div>
      
      <!-- main card -->
      <div class="rounded-2xl overflow-hidden">
        <div class="max-h-[calc(100vh-80px)] flex flex-col m-2 bg-[#fbfbfb] rounded-2xl p-6 relative">
          
          <!-- header with PureLife logo -->
          <div class="py-4 text-center border-b border-b-[#979797]">
            <img src="https://www.purelifehealth.io/app-logo.png" class="max-h-[64px] max-w-[160px] object-contain mx-auto" width="160" height="45" alt="PureLife Health logo">
          </div>
          
          <!-- scrollable content -->
          <div class="overflow-y-auto no-scrollbar">
            <h1 class="text-center text-[#2c2c2c] text-2xl mt-4">Consult a Doctor</h1>
            <p class="text-[#666] text-xs text-center mt-4 leading-relaxed">Fill the form below and we'll connect you to a doctor</p>
            
            <!-- Step Indicator -->
            <div class="step-indicator mt-4" id="stepIndicator">
              <div class="step active" id="step1-indicator">
                <div class="step-number">1</div>
                <span class="step-label">Personal Info</span>
              </div>
              <div class="step" id="step2-indicator">
                <div class="step-number">2</div>
                <span class="step-label">Medical Details</span>
              </div>
            </div>
            
            <!-- main form area -->
            <div class="px-0.5 m-1">
              <!-- Success Page (hidden by default) -->
              <div id="successPage" class="success-page hidden">
                <div class="success-icon">✓</div>
                <h2 class="success-title">Consultation Scheduled!</h2>
                <p class="text-[#666] text-sm">Your consultation has been successfully booked</p>
                
                <div class="tracking-id">
                  <div class="tracking-label">Tracking ID</div>
                  <div class="tracking-value" id="trackingId">45140</div>
                </div>
                
                <div class="consultation-details" id="consultationDetails">
                  <!-- Will be filled dynamically -->
                </div>
                
                <a href="#" id="joinConsultationBtn" class="join-btn" target="_blank">Join Consultation</a>
                <button id="newConsultationBtn" class="new-consultation-btn">Schedule New Consultation</button>
              </div>

              <!-- Form -->
              <div id="formContainer">
                <form id="consultationForm" class="flex flex-col mt-4">
                  <!-- Step 1: Personal Information -->
                  <div id="step1" class="step-content">
                    <div class="grid grid-cols-2 gap-4 form-group">
                      <!-- first name -->
                      <div>
                        <label class="text-sm leading-none font-medium" for="firstName">First name <sup class="text-destructive">*</sup></label>
                        <input type="text" id="firstName" name="firstName" placeholder="e.g., John" required
                               class="flex h-12 w-full rounded-md border border-input bg-white px-3 py-1 shadow-sm mt-1"
                               style="outline-color: #d0404c;" autocomplete="given-name">
                      </div>
                      <!-- last name -->
                      <div>
                        <label class="text-sm leading-none font-medium" for="lastName">Last name <sup class="text-destructive">*</sup></label>
                        <input type="text" id="lastName" name="lastName" placeholder="e.g., Doe" required
                               class="flex h-12 w-full rounded-md border border-input bg-white px-3 py-1 shadow-sm mt-1"
                               style="outline-color: #d0404c;" autocomplete="family-name">
                      </div>
                      <!-- email (full width) -->
                      <div class="col-span-2">
                        <label class="text-sm leading-none font-medium" for="email">Email <sup class="text-destructive">*</sup></label>
                        <input type="email" id="email" name="email" placeholder="you@example.com" required
                               class="flex h-12 w-full rounded-md border border-input bg-white px-3 py-1 shadow-sm mt-1"
                               style="outline-color: #d0404c;" autocomplete="email">
                      </div>
                      <!-- phone (full width) -->
                      <div class="col-span-2">
                        <label class="text-sm leading-none font-medium" for="phoneNumber">Phone number <sup class="text-destructive">*</sup></label>
                        <input type="tel" id="phoneNumber" name="phoneNumber" placeholder="+234 800 000 0000" required
                               class="flex h-12 w-full rounded-md border border-input bg-white px-3 py-1 shadow-sm mt-1"
                               style="outline-color: #d0404c;" autocomplete="tel">
                      </div>
                      <!-- gender -->
                      <div>
                        <label class="text-sm leading-none font-medium" for="gender">Gender <sup class="text-destructive">*</sup></label>
                        <select id="gender" name="gender" required
                                class="flex h-12 w-full rounded-md border border-input bg-white px-3 py-1 shadow-sm mt-1"
                                style="outline-color: #d0404c;">
                          <option value="" disabled selected>Select</option>
                          <option value="Male">Male</option>
                          <option value="Female">Female</option>
                        </select>
                      </div>
                      <!-- dob -->
                      <div>
                        <label class="text-sm leading-none font-medium" for="dob">Date of birth <sup class="text-destructive">*</sup></label>
                        <input type="date" id="dob" name="dob" required
                               class="flex h-12 w-full rounded-md border border-input bg-white px-3 py-1 shadow-sm mt-1"
                               style="outline-color: #d0404c;" autocomplete="bday">
                      </div>
                    </div>
                  </div>

                  <!-- Step 2: Medical Details -->
                  <div id="step2" class="step-content hidden">
                    <!-- doctor id (hidden) -->
                    <input type="hidden" name="doctor" value="62fb71cc87b0180013f54f15">

                    <!-- SYMPTOMS -->
                    <div class="form-group">
                      <label class="text-sm leading-none font-medium">Symptoms <sup class="text-destructive">*</sup></label>
                      <div id="symptoms-container" class="mt-2">
                        <div id="symptom-tags" class="flex flex-wrap min-h-[32px]"></div>
                        
                        <div class="symptom-input-wrapper">
                          <input type="text" id="symptomInput" placeholder="e.g., Cough, Fever" 
                                 class="flex h-12 rounded-md border border-input bg-white px-3 py-1 shadow-sm"
                                 style="outline-color: #d0404c; width: 70%;">
                          <button type="button" id="addSymptomBtn" class="add-symptom-btn">+ Add symptom</button>
                        </div>
                      </div>
                      <input type="hidden" name="symptoms" id="symptomsData" value='[]'>
                    </div>

                    <!-- Discomfort level + First noticed — 2 columns on ALL screen sizes -->
                    <div class="grid grid-cols-2 gap-4 form-group">
                      <div>
                        <label class="text-sm leading-none font-medium" for="discomfortLevel">Discomfort (1-10) <sup class="text-destructive">*</sup></label>
                        <input type="number" id="discomfortLevel" name="discomfortLevel" min="1" max="10" placeholder="e.g., 5" required
                               class="flex h-12 w-full rounded-md border border-input bg-white px-3 py-1 shadow-sm mt-1"
                               style="outline-color: #d0404c;" inputmode="numeric">
                      </div>
                      
                      <div>
                        <label class="text-sm leading-none font-medium" for="firstNotice">First noticed <sup class="text-destructive">*</sup></label>
                        <select id="firstNotice" name="firstNotice" required
                                class="flex h-12 w-full rounded-md border border-input bg-white px-3 py-1 shadow-sm mt-1"
                                style="outline-color: #d0404c;">
                          <option value="" disabled selected>When?</option>
                          <option value="today">Today</option>
                          <option value="yesterday">Yesterday</option>
                          <option value="last week">Last week</option>
                          <option value="two weeks ago">Two weeks ago</option>
                          <option value="more than a month">More than a month</option>
                        </select>
                      </div>
                    </div>

                    <!-- Contact medium (full width) -->
                    <div class="form-group">
                      <label class="text-sm leading-none font-medium" for="contactMedium">
                        Contact medium <sup class="text-destructive">*</sup>
                      </label>
                      <select id="contactMedium" name="contactMedium" required
                              class="flex h-12 w-full rounded-md border border-input bg-white px-3 py-1 shadow-sm mt-1"
                              style="outline-color: #d0404c;">
                        <option value="" disabled selected>Select preference</option>
                        <option value="video">Video</option>
                        <option value="audio">Audio</option>
                        <option value="chat">Chat</option>
                      </select>
                    </div>

                    <!-- Medical Specialist -->
                    <div class="form-group">
                      <label class="text-sm leading-none font-medium" for="medicalSpecialist">Medical specialist <sup class="text-destructive">*</sup></label>
                      <select id="medicalSpecialist" name="medicalSpecialist" required
                              class="flex h-12 w-full rounded-md border border-input bg-white px-3 py-1 shadow-sm mt-1"
                              style="outline-color: #d0404c;">
                        <option value="" disabled selected>Select specialist type</option>
                        <option value="Cardiologist">Cardiologist (Heart Specialist)</option>
                        <option value="Dermatologist">Dermatologist (Skin Specialist)</option>
                        <option value="Endocrinologist">Endocrinologist (Hormone Specialist)</option>
                        <option value="Gastroenterologist">Gastroenterologist (Digestive Specialist)</option>
                        <option value="General Practitioner">General Practitioner</option>
                        <option value="Gynecologist">Gynecologist</option>
                        <option value="Neurologist">Neurologist (Brain & Nerve Specialist)</option>
                        <option value="Ophthalmologist">Ophthalmologist (Eye Specialist)</option>
                        <option value="Orthopedist">Orthopedist (Bone & Joint Specialist)</option>
                        <option value="Pediatrician">Pediatrician (Children's Specialist)</option>
                        <option value="Psychiatrist">Psychiatrist (Mental Health Specialist)</option>
                        <option value="Urologist">Urologist</option>
                        <option value="Other">Other (please specify in description)</option>
                      </select>
                    </div>

                    <!-- Appointment time -->
                    <div class="form-group">
                      <label class="text-sm leading-none font-medium" for="appointmentTime">Appointment time <sup class="text-destructive">*</sup></label>
                      <input type="datetime-local" id="appointmentTime" name="appointmentTime" required
                             class="flex h-12 w-full rounded-md border border-input bg-white px-3 py-1 shadow-sm mt-1"
                             style="outline-color: #d0404c;">
                    </div>

                    <!-- Description (optional) -->
                    <div class="form-group">
                      <label class="text-sm leading-none font-medium" for="description">
                        Description <span class="optional-badge">(optional)</span>
                      </label>
                      <textarea id="description" name="description" placeholder="Please describe your symptoms in detail, including any relevant medical history..."
                                class="flex w-full rounded-md border border-input bg-white px-3 shadow-sm mt-1"
                                style="outline-color: #d0404c; min-height: 120px; padding-top: 0.75rem; padding-bottom: 0.75rem;"></textarea>
                    </div>

                    <!-- hidden fields -->
                    <input type="hidden" name="type" value="scheduled">
                    <input type="hidden" name="providerId" value="69b16fb5a4af2c7a8645968f">
                    <input type="hidden" name="createdThrough" value="api">
                    <input type="hidden" name="paid" value="true">
                  </div>

                  <!-- Navigation buttons -->
                  <div class="nav-buttons">
                    <button type="button" id="prevBtn" class="nav-btn prev hidden">Previous</button>
                    <button type="button" id="nextBtn" class="nav-btn next">Next</button>
                    <button type="submit" id="submitBtn" class="w-full py-3 px-6 bg-[#d0404c] text-white rounded-full font-semibold text-sm hover:bg-[#b83642] transition disabled:opacity-50 disabled:cursor-not-allowed hidden">Schedule consultation</button>
                  </div>

                  <!-- status message -->
                  <div id="formStatus" class="text-xs text-center text-[#929292] mt-4"></div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const form = document.getElementById('consultationForm');
      const submitBtn = document.getElementById('submitBtn');
      const statusDiv = document.getElementById('formStatus');
      const formContainer = document.getElementById('formContainer');
      const successPage = document.getElementById('successPage');
      const stepIndicator = document.getElementById('stepIndicator');

      const trackingIdEl = document.getElementById('trackingId');
      const consultationDetailsEl = document.getElementById('consultationDetails');
      const joinConsultationBtn = document.getElementById('joinConsultationBtn');
      const newConsultationBtn = document.getElementById('newConsultationBtn');

      const step1 = document.getElementById('step1');
      const step2 = document.getElementById('step2');
      const step1Indicator = document.getElementById('step1-indicator');
      const step2Indicator = document.getElementById('step2-indicator');
      const prevBtn = document.getElementById('prevBtn');
      const nextBtn = document.getElementById('nextBtn');

      let currentStep = 1;
      let currentConsultationData = null;

      // Symptom multi-input logic
      const symptomInput = document.getElementById('symptomInput');
      const addBtn = document.getElementById('addSymptomBtn');
      const symptomTags = document.getElementById('symptom-tags');
      const symptomsHidden = document.getElementById('symptomsData');

      let symptoms = []; 

      function renderSymptoms() {
        symptomTags.innerHTML = '';
        if (symptoms.length === 0) {
          const emptyHint = document.createElement('span');
          emptyHint.className = 'text-xs text-[#929292]';
          emptyHint.textContent = 'No symptoms added yet.';
          symptomTags.appendChild(emptyHint);
        } else {
          symptoms.forEach((symptom, index) => {
            const tag = document.createElement('span');
            tag.className = 'symptom-tag';
            tag.innerHTML = `${symptom.name} <button type="button" data-index="${index}">✕</button>`;
            symptomTags.appendChild(tag);
          });

          document.querySelectorAll('.symptom-tag button').forEach(btn => {
            btn.addEventListener('click', (e) => {
              const index = e.target.getAttribute('data-index');
              if (index !== null) {
                symptoms.splice(index, 1);
                renderSymptoms();
                updateHiddenField();
              }
              e.stopPropagation();
            });
          });
        }
        updateHiddenField();
      }

      function updateHiddenField() {
        symptomsHidden.value = JSON.stringify(symptoms.map(s => ({ name: s.name })));
      }

      addBtn.addEventListener('click', () => {
        const newSymptom = symptomInput.value.trim();
        if (newSymptom) {
          symptoms.push({ name: newSymptom });
          renderSymptoms();
          symptomInput.value = '';
        } else {
          alert('Please enter a symptom');
        }
      });

      symptomInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          e.preventDefault();
          addBtn.click();
        }
      });

      renderSymptoms();

      function showStep(step) {
        if (step === 1) {
          step1.classList.remove('hidden');
          step2.classList.add('hidden');
          step1Indicator.classList.add('active');
          step2Indicator.classList.remove('active', 'completed');
          prevBtn.classList.add('hidden');
          nextBtn.classList.remove('hidden');
          submitBtn.classList.add('hidden');
        } else if (step === 2) {
          step1.classList.add('hidden');
          step2.classList.remove('hidden');
          step1Indicator.classList.remove('active');
          step1Indicator.classList.add('completed');
          step2Indicator.classList.add('active');
          prevBtn.classList.remove('hidden');
          nextBtn.classList.add('hidden');
          submitBtn.classList.remove('hidden');
        }
        currentStep = step;
      }

      function validateStep1() {
        const firstName = document.getElementById('firstName').value;
        const lastName = document.getElementById('lastName').value;
        const email = document.getElementById('email').value;
        const phoneNumber = document.getElementById('phoneNumber').value;
        const gender = document.getElementById('gender').value;
        const dob = document.getElementById('dob').value;

        if (!firstName || !lastName || !email || !phoneNumber || !gender || !dob) {
          statusDiv.innerHTML = '<span style="color: #d0404c;">✗ Please fill all required fields in Step 1.</span>';
          return false;
        }
        return true;
      }

      nextBtn.addEventListener('click', () => {
        if (validateStep1()) {
          statusDiv.innerHTML = '';
          showStep(2);
        }
      });

      prevBtn.addEventListener('click', () => {
        showStep(1);
      });

      function showSuccessPage(data) {
        currentConsultationData = data;
        formContainer.classList.add('hidden');
        successPage.classList.remove('hidden');
        stepIndicator.classList.add('hidden');

        trackingIdEl.textContent = data.trackingId || 'N/A';

        const appointmentTime = new Date(data.time).toLocaleString('en-US', {
          dateStyle: 'full',
          timeStyle: 'short'
        });

        const detailsHTML = `
          <div class="detail-row">
            <span class="detail-label">Doctor</span>
            <span class="detail-value">Dr. ${data.doctorData.firstName} ${data.doctorData.lastName}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Specialization</span>
            <span class="detail-value">${data.doctorData.specialization}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Appointment Time</span>
            <span class="detail-value">${appointmentTime}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Contact Medium</span>
            <span class="detail-value">${data.contactMedium.charAt(0).toUpperCase() + data.contactMedium.slice(1)}</span>
          </div>
          <div class="detail-row">
            <span class="detail-label">Symptoms</span>
            <span class="detail-value">${data.symptoms.map(s => s.name).join(', ')}</span>
          </div>
        `;

        consultationDetailsEl.innerHTML = detailsHTML;
        joinConsultationBtn.href = data.url || '#';
      }

      function resetToForm() {
        formContainer.classList.remove('hidden');
        successPage.classList.add('hidden');
        stepIndicator.classList.remove('hidden');
        form.reset();
        symptoms = [];
        renderSymptoms();
        showStep(1);
        currentConsultationData = null;
      }

      newConsultationBtn.addEventListener('click', resetToForm);

      const BASE_URL = 'https://api.heala.io';
      const API_KEY = '8DiI87i08kBC/vtA3~W';

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        if (symptoms.length === 0) {
          statusDiv.innerHTML = '<span style="color: #d0404c;">✗ Please add at least one symptom.</span>';
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Scheduling...';
        statusDiv.textContent = '';

        const firstName = document.getElementById('firstName').value;
        const lastName = document.getElementById('lastName').value;
        const email = document.getElementById('email').value;
        const phoneNumber = document.getElementById('phoneNumber').value;
        const gender = document.getElementById('gender').value;
        const dob = document.getElementById('dob').value;
        const doctor = document.querySelector('input[name="doctor"]').value;
        
        let symptomsArray = [];
        try {
          symptomsArray = JSON.parse(symptomsHidden.value);
        } catch (e) {
          symptomsArray = [];
        }

        const discomfortLevel = document.getElementById('discomfortLevel').value;
        const description = document.getElementById('description').value;
        const firstNotice = document.getElementById('firstNotice').value;
        const contactMedium = document.getElementById('contactMedium').value;
        const medicalSpecialist = document.getElementById('medicalSpecialist').value;
        const type = document.querySelector('input[name="type"]').value;
        const appointmentTimeInput = document.getElementById('appointmentTime').value;

        const providerId = document.querySelector('input[name="providerId"]').value; 
        const createdThrough = document.querySelector('input[name="createdThrough"]').value;
        const paid = document.querySelector('input[name="paid"]').value === 'true';

        if (!firstName || !lastName || !email || !phoneNumber || !gender || !dob || !discomfortLevel || !firstNotice || !contactMedium || !medicalSpecialist || !appointmentTimeInput) {
          statusDiv.innerHTML = '<span style="color: #d0404c;">✗ Please fill all required fields.</span>';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Schedule consultation';
          return;
        }

        let isoTime = '';
        try {
          const localDate = new Date(appointmentTimeInput);
          if (!isNaN(localDate.getTime())) {
            isoTime = localDate.toISOString(); 
          } else {
            throw new Error('Invalid date');
          }
        } catch (e) {
          statusDiv.innerHTML = '<span style="color: #d0404c;">✗ Invalid appointment time.</span>';
          submitBtn.disabled = false;
          submitBtn.textContent = 'Schedule consultation';
          return;
        }

        let combinedDescription = `Medical specialist requested: ${medicalSpecialist}`;
        if (description && description.trim() !== '') {
          combinedDescription += `\n\nPatient description: ${description}`;
        }

        const payload = {
          patientData: {
            firstName,
            lastName,
            email,
            phoneNumber,
            gender,
            dob
          },
          doctor,
          symptoms: symptomsArray,
          discomfortLevel: discomfortLevel.toString(),
          description: combinedDescription,
          firstNotice,
          contactMedium: contactMedium,
          type,
          time: isoTime,
          createdThrough,
          providerId,
          paid
        };

        try {
          const response = await fetch(`${BASE_URL}/rest/consultations/external/create`, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Api-Key ${API_KEY}`
            },
            body: JSON.stringify(payload)
          });

          const data = await response.json();

          if (response.ok && data.statusCode === 201) {
            statusDiv.innerHTML = '';
            showSuccessPage(data.data);
          } else {
            console.error('API error', data);
            statusDiv.innerHTML = `<span style="color: #d0404c;">✗ Error: ${data.message || 'Something went wrong'}</span>`;
          }
        } catch (error) {
          console.error('Network error', error);
          statusDiv.innerHTML = '<span style="color: #d0404c;">✗ Network error. Please try again.</span>';
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Schedule consultation';
        }
      });

      // Focus outline style
      const inputs = document.querySelectorAll('input, select, textarea');
      inputs.forEach(input => {
        input.addEventListener('focus', () => {
          input.style.outline = '2px solid #d0404c';
          input.style.outlineOffset = '0';
        });
        input.addEventListener('blur', () => {
          input.style.outline = '';
        });
      });

    })();
  </script>

  <div role="region" aria-label="Notifications" tabindex="-1" style="pointer-events: none;"><ol tabindex="-1" class="fixed top-0 z-[100] flex max-h-screen w-full flex-col-reverse p-4 sm:bottom-0 sm:right-0 sm:top-auto sm:flex-col md:max-w-[420px]"></ol></div>
</body>
</html>
